name: Batch Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install ruff
      - run: ruff check . --ignore E501,W292,W291

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t batch-pipeline .
      - run: docker build -f Dockerfile.airflow -t batch-pipeline-airflow .

  integration:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, docker-build]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Start Airflow stack
        run: docker compose up -d

      - name: Wait for Airflow webserver
        run: |
          echo "Waiting for Airflow webserver..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8085/health | grep -q '"healthy"'; then
              echo "Airflow is ready after $((i * 10))s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Timed out waiting for Airflow"
              docker compose logs airflow-webserver
              exit 1
            fi
            echo "Attempt $i/30..."
            sleep 10
          done

      - name: Wait for DAG to be loaded
        run: |
          echo "Waiting for DAG to be parsed by scheduler..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -u admin:admin \
              http://localhost:8085/api/v1/dags/batch_data_pipeline | \
              python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('dag_id','missing'))" 2>/dev/null)
            if [ "$STATUS" = "batch_data_pipeline" ]; then
              echo "DAG loaded after $((i * 10))s"
              break
            fi
            if [ "$i" = "20" ]; then
              echo "Timed out waiting for DAG to load"
              exit 1
            fi
            echo "Attempt $i/20..."
            sleep 10
          done

      - name: Unpause and trigger DAG
        run: |
          curl -s -X PATCH http://localhost:8085/api/v1/dags/batch_data_pipeline \
            -H "Content-Type: application/json" \
            -u admin:admin \
            -d '{"is_paused": false}'
          sleep 3
          RESPONSE=$(curl -sf -X POST http://localhost:8085/api/v1/dags/batch_data_pipeline/dagRuns \
            -H "Content-Type: application/json" \
            -u admin:admin \
            -d '{"conf": {}}')
          echo "$RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['dag_run_id'])")
          echo "DAG_RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Wait for DAG completion
        run: |
          echo "Polling DAG run: $DAG_RUN_ID"
          for i in $(seq 1 60); do
            STATE=$(curl -sf http://localhost:8085/api/v1/dags/batch_data_pipeline/dagRuns/$DAG_RUN_ID \
              -u admin:admin | python3 -c "import sys, json; print(json.load(sys.stdin)['state'])")
            echo "[$i/60] State: $STATE"
            if [ "$STATE" = "success" ]; then
              echo "DAG completed successfully"
              exit 0
            elif [ "$STATE" = "failed" ]; then
              echo "DAG failed"
              docker compose logs airflow-scheduler
              exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for DAG completion"
          exit 1

      - name: Verify S3 output
        run: |
          COUNT=$(aws s3 ls s3://de-batch-pipeline-sg/cleaned/orders/ --recursive | grep ".parquet" | wc -l)
          echo "Parquet files found: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "No Parquet files found in S3 output path"
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
